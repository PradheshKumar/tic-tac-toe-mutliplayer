version: "3"
services:
  nakama:
    image: heroiclabs/nakama:latest
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        sleep 5;
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --name nakama1
        --database.address postgres:localdb@postgres:5432/nakama
        --logger.level DEBUG
        --runtime.path /nakama/data/modules/build
    ports:
      - "7350:7350"
      - "7351:7351"
    depends_on:
      - postgres
    volumes:
      - ./nakama/build:/nakama/data/modules/build

  postgres:
    image: postgres:12
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb  